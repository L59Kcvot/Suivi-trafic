<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Trafic Île-de-France Officiel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 24px; color: #111; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .section-transport {
            display: flex;
            align-items: center;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .type-label {
            width: 90px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        .type-icon {
            height: 26px;
            margin-right: 5px;
        }
        .lines-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        
        /* Style des boutons avec les vrais logos */
        .line-btn {
            height: 32px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .line-btn:hover { transform: scale(1.15); }
        
        /* Fenêtre d'incidents */
        .incident-report {
            margin-top: 40px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: none;
        }
        .incident-report.active { display: block; }
        .report-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #0066cc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔄 Information trafic en Temps Réel</h1>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="assets/modes/rer.png" alt="RER">
        </div>
        <div class="lines-grid" id="rer-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="assets/modes/metro.png" alt="M">
        </div>
        <div class="lines-grid" id="metro-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="assets/modes/tram.png" alt="T">
        </div>
        <div class="lines-grid" id="tram-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="assets/modes/train.png" alt="Train">
        </div>
        <div class="lines-grid" id="train-container"></div>
    </div>

    <div id="incident-box" class="incident-report">
        <div id="incident-title" class="report-title">Ligne</div>
        <div id="incident-text">Sélectionne une ligne pour voir l'état du trafic du tiécar.</div>
    </div>
</div>

<script>
    // Listes des lignes
    const rers = ['A', 'B', 'C', 'D', 'E'];
    const metros = ['1', '2', '3', '3bis', '4', '5', '6', '7', '7bis', '8', '9', '10', '11', '12', '13', '14'];
    const trams = ['1', '2', '3a', '3b', '4', '5', '6', '7', '8', '9'];
    const trains = ['H', 'J', 'K', 'L', 'N', 'P', 'R', 'U'];

    // Génération automatique des images locales
    function genererBoutons(liste, type, containerId) {
        const container = document.getElementById(containerId);
        liste.forEach(ligne => {
            const img = document.createElement('img');
            img.className = 'line-btn';
            // Va chercher l'image directement dans ton dossier assets/lines/
            img.src = `assets/lines/${type.toLowerCase()}_${ligne.toLowerCase()}.png`;
            img.alt = `${type} ${ligne}`;
            
            const nomRecherche = type === 'Métro' ? `Ligne ${ligne}` : `${type.toUpperCase()} ${ligne.toUpperCase()}`;
            img.onclick = () => checkLigne(nomRecherche);
            container.appendChild(img);
        });
    }

    genererBoutons(rers, 'RER', 'rer-container');
    genererBoutons(metros, 'Métro', 'metro-container');
    genererBoutons(trams, 'Tram', 'tram-container');
    genererBoutons(trains, 'Train', 'train-container');

    function checkLigne(nomLigne) {
        const box = document.getElementById('incident-box');
        const title = document.getElementById('incident-title');
        const text = document.getElementById('incident-text');
        
        title.innerText = `État du trafic - ${nomLigne}`;
        box.classList.add('active');
        
        fetch('trafic.json')
            .then(res => res.json())
            .then(data => {
                let incidentTrouve = "";
                if (data.resultats) {
                    data.resultats.forEach(item => {
                        if (item.texte && item.texte.toLowerCase().includes(nomLigne.toLowerCase())) {
                            incidentTrouve += `<p>⚠️ ${item.texte}</p>`;
                        }
                    });
                }
                text.innerHTML = incidentTrouve !== "" ? incidentTrouve : "✅ **Trafic régulier.** Aucune perturbation majeure signalée sur cette ligne.";
            })
            .catch(() => { text.innerText = "Erreur de chargement des données."; });
    }
</script>

</body>
</html>
