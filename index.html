<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Trafic Île-de-France Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 25px; border-bottom: 2px solid #002f6c; padding-bottom: 10px; color: #002f6c; }
        
        .section-transport { display: flex; align-items: center; margin-bottom: 20px; background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .type-label { width: 90px; font-weight: bold; color: #002f6c; font-size: 16px; text-transform: uppercase; }
        .lines-grid { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }
        
        .line-btn { 
            height: 34px; 
            cursor: pointer; 
            transition: transform 0.1s; 
            user-select: none;
        }
        .line-btn:hover { transform: scale(1.2); }
        
        .incident-report { margin-top: 30px; padding: 20px; background-color: #fff; border-radius: 8px; border: 2px solid #ddd; display: none; }
        .incident-report.active { display: block; }
        .report-title { font-weight: bold; font-size: 18px; margin-bottom: 12px; color: #002f6c; display: flex; align-items: center; gap: 8px; }
        .warning { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; border-left: 5px solid #d32f2f; margin-bottom: 10px; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 12px; border-radius: 6px; border-left: 5px solid #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-train-subway"></i> Information trafic en Temps Réel</h1>

    <div class="section-transport"><div class="type-label">Métro</div><div class="lines-grid" id="m-grid"></div></div>
    <div class="section-transport"><div class="type-label">RER</div><div class="lines-grid" id="r-grid"></div></div>
    <div class="section-transport"><div class="type-label">Tram</div><div class="lines-grid" id="t-grid"></div></div>

    <div id="incident-box" class="incident-report">
        <div id="incident-title" class="report-title">Ligne</div>
        <div id="incident-text">Sélectionne une ligne.</div>
    </div>
</div>

<script>
    const codesImages = {
        'm-1': 'LIG_IDFM_C01371.svg', 'm-2': 'LIG_IDFM_C01372.svg', 'm-3': 'LIG_IDFM_C01373.svg', 
        'm-4': 'LIG_IDFM_C01374.svg', 'm-5': 'LIG_IDFM_C01375.svg', 'm-6': 'LIG_IDFM_C01376.svg', 
        'm-7': 'LIG_IDFM_C01377.svg', 'm-8': 'LIG_IDFM_C01378.svg', 'm-9': 'LIG_IDFM_C01379.svg', 
        'm-10': 'LIG_IDFM_C01380.svg', 'm-11': 'LIG_IDFM_C01381.svg', 'm-12': 'LIG_IDFM_C01382.svg', 
        'm-13': 'LIG_IDFM_C01383.svg', 'm-14': 'LIG_IDFM_C01384.svg', 
        'm-3bis': 'picto-ligne-LIGIDFMC01386.1781406331.svg', 'm-7bis': 'picto-ligne-LIGIDFMC01387.1781406331.svg',
        'rer-A': 'LIG_IDFM_C01742.svg', 'rer-B': 'LIG_IDFM_C01743.svg', 'rer-C': 'LIG_IDFM_C01744.svg', 'rer-D': 'LIG_IDFM_C01745.svg', 'rer-E': 'LIG_IDFM_C01746.svg',
        'tram-1': 'LIG_IDFM_C01389.svg', 'tram-2': 'LIG_IDFM_C01390.svg', 'tram-3a': 'LIG_IDFM_C01391.svg', 'tram-3b': 'LIG_IDFM_C01392.svg', 
        'tram-4': 'LIG_IDFM_C01819.svg', 'tram-5': 'LIG_IDFM_C01684.svg', 'tram-6': 'LIG_IDFM_C01794.svg', 'tram-7': 'LIG_IDFM_C01795.svg', 
        'tram-8': 'LIG_IDFM_C01796.svg', 'tram-9': 'LIG_IDFM_C02317.svg'
    };

    const metros = ['1','2','3','3bis','4','5','6','7','7bis','8','9','10','11','12','13','14'];
    const rers = ['A','B','C','D','E'];
    const trams = ['1','2','3a','3b','4','5','6','7','8','9'];

    const mGrid = document.getElementById('m-grid');
    metros.forEach(l => {
        const img = document.createElement('img');
        img.className = 'line-btn';
        img.src = codesImages[`m-${l}`]; 
        img.alt = `Métro ${l}`;
        img.onclick = () => verifTrafic('metro', l);
        mGrid.appendChild(img);
    });

    const rGrid = document.getElementById('r-grid');
    rers.forEach(l => {
        const img = document.createElement('img');
        img.className = 'line-btn';
        img.src = codesImages[`rer-${l}`];
        img.alt = `RER ${l}`;
        img.onclick = () => verifTrafic('rer', l);
        rGrid.appendChild(img);
    });

    const tGrid = document.getElementById('t-grid');
    trams.forEach(l => {
        const img = document.createElement('img');
        img.className = 'line-btn';
        img.src = codesImages[`tram-${l}`];
        img.alt = `Tram ${l}`;
        img.onclick = () => verifTrafic('tram', l);
        tGrid.appendChild(img);
    });

    function verifTrafic(type, ligne) {
        const box = document.getElementById('incident-box');
        const title = document.getElementById('incident-title');
        const text = document.getElementById('incident-text');
        
        title.innerHTML = `<i class="fa-solid fa-circle-info"></i> État du trafic - ${type.toUpperCase()} ${ligne}`;
        box.classList.add('active');
        text.innerHTML = "Interrogation des serveurs Île-de-France Mobilités...";

        // Connexion au flux central IDFM / Navitia (Le seul mis à jour en 2026)
        fetch('https://api.navitia.io/v1/coverage/fr-idf/line_reports?limit=100', {
            headers: { 'Authorization': '54160351-b845-4235-90d5-5d97f26f6eb8' } // Clé publique Navitia IDF
        })
        .then(res => res.json())
        .then(data => {
            const rapports = data.line_reports || [];
            
            // On cherche l'incident qui correspond à notre ligne (ex: "A", "B", "1")
            const incidentLigne = rapports.find(r => {
                const codeApi = r.line.code.toString().toUpperCase().trim();
                const cible = ligne.toString().toUpperCase().trim();
                return codeApi === cible;
            });

            if (incidentLigne && incidentLigne.pt_objects) {
                // S'il y a un rapport d'incident actif sur IDFM
                const titreBlame = incidentLigne.cause || "Perturbation";
                const messageBlame = incidentLigne.description || "Trafic perturbé sur cette ligne.";
                text.innerHTML = `<div class="warning"><strong>⚠️ ${titreBlame}</strong><br>${messageBlame}</div>`;
            } else {
                // Si IDFM n'a aucun signalement de panne
                text.innerHTML = `<div class="success">✅ <strong>Trafic régulier</strong><br>Le trafic est fluide sur l'ensemble de la ligne.</div>`;
            }
        })
        .catch(() => { 
            text.innerHTML = "<span style='color:red;'>Erreur de connexion directe avec les serveurs Île-de-France Mobilités.</span>"; 
        });
    }
</script>
</body>
</html>
