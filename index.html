<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Trafic Île-de-France Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 25px; border-bottom: 2px solid #002f6c; padding-bottom: 10px; color: #002f6c; }
        
        .section-transport { display: flex; align-items: center; margin-bottom: 20px; background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .type-label { width: 90px; font-weight: bold; color: #002f6c; font-size: 16px; text-transform: uppercase; }
        .lines-grid { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }
        
        /* Tes logos enfin opérationnels */
        .line-btn { height: 34px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        .line-btn:hover { transform: scale(1.2); }
        
        /* Boutons de secours */
        .text-btn { display: inline-flex; align-items: center; justify-content: center; height: 34px; min-width: 34px; border-radius: 50%; background: #002f6c; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer; user-select: none; padding: 0 5px; }
        .text-btn:hover { transform: scale(1.2); }
        .text-btn.rer { border-radius: 4px; background: #0055c8; }
        .text-btn.tram { border-radius: 4px; background: #ff8000; }

        .incident-report { margin-top: 30px; padding: 20px; background-color: #fff; border-radius: 8px; border: 2px solid #ddd; display: none; }
        .incident-report.active { display: block; }
        .report-title { font-weight: bold; font-size: 18px; margin-bottom: 12px; color: #002f6c; display: flex; align-items: center; gap: 8px; }
        .warning { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; border-left: 5px solid #d32f2f; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 12px; border-radius: 6px; border-left: 5px solid #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-train-subway"></i> Information trafic en Temps Réel</h1>

    <div class="section-transport"><div class="type-label">Métro</div><div class="lines-grid" id="m-grid"></div></div>
    <div class="section-transport"><div class="type-label">RER</div><div class="lines-grid" id="r-grid"></div></div>
    <div class="section-transport"><div class="type-label">Tram</div><div class="lines-grid" id="t-grid"></div></div>

    <div id="incident-box" class="incident-report">
        <div id="incident-title" class="report-title">Ligne</div>
        <div id="incident-text">Sélectionne une ligne.</div>
    </div>
</div>

<script>
    // Configuration 100% synchro avec ta nouvelle arborescence "Logos/Métro/"
    const codesImages = {
        'm-1': 'Logos/Métro/LIG_IDFM_C01371.svg', 
        'm-2': 'Logos/Métro/LIG_IDFM_C01372.svg', 
        'm-3': 'Logos/Métro/LIG_IDFM_C01373.svg', 
        'm-4': 'Logos/Métro/LIG_IDFM_C01374.svg', 
        'm-5': 'Logos/Métro/LIG_IDFM_C01375.svg', 
        'm-6': 'Logos/Métro/LIG_IDFM_C01376.svg', 
        'm-7': 'Logos/Métro/LIG_IDFM_C01377.svg', 
        'm-8': 'Logos/Métro/LIG_IDFM_C01378.svg', 
        'm-9': 'Logos/Métro/LIG_IDFM_C01379.svg', 
        'm-10': 'Logos/Métro/LIG_IDFM_C01380.svg', 
        'm-11': 'Logos/Métro/LIG_IDFM_C01381.svg', 
        'm-12': 'Logos/Métro/LIG_IDFM_C01382.svg', 
        'm-13': 'Logos/Métro/LIG_IDFM_C01383.svg', 
        'm-14': 'Logos/Métro/LIG_IDFM_C01384.svg', 
        'm-3bis': 'Logos/Métro/picto-ligne-LIGIDFMC01386.1781406331.svg', 
        'm-7bis': 'Logos/Métro/picto-ligne-LIGIDFMC01387.1781406331.svg'
    };

    const metros = ['1','2','3','3bis','4','5','6','7','7bis','8','9','10','11','12','13','14'];
    const rers = ['A','B','C','D','E'];
    const trams = ['1','2','3a','3b','4','5','6','7','8','9'];

    // Génération Métros
    const mGrid = document.getElementById('m-grid');
    metros.forEach(l => {
        const img = document.createElement('img');
        img.className = 'line-btn';
        img.src = codesImages[`m-${l}`]; 
        img.alt = `Métro ${l}`;
        img.onclick = () => verifTrafic('metro', l);
        mGrid.appendChild(img);
    });

    // Génération RER
    const rGrid = document.getElementById('r-grid');
    rers.forEach(l => {
        const txtBtn = document.createElement('div');
        txtBtn.className = 'text-btn rer';
        txtBtn.innerText = `RER ${l}`;
        txtBtn.onclick = () => verifTrafic('rer', l);
        rGrid.appendChild(txtBtn);
    });

    // Génération Trams
    const tGrid = document.getElementById('t-grid');
    trams.forEach(l => {
        const txtBtn = document.createElement('div');
        txtBtn.className = 'text-btn tram';
        txtBtn.innerText = `T${l}`;
        txtBtn.onclick = () => verifTrafic('tram', l);
        tGrid.appendChild(txtBtn);
    });

    function verifTrafic(type, ligne) {
        const box = document.getElementById('incident-box');
        const title = document.getElementById('incident-title');
        const text = document.getElementById('incident-text');
        
        title.innerHTML = `<i class="fa-solid fa-circle-info"></i> État du trafic - ${type.toUpperCase()} ${ligne}`;
        box.classList.add('active');
        text.innerHTML = "Chargement des infos...";

        fetch('trafic.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const key = type === 'metro' ? 'metros' : (type === 'rer' ? 'rers' : 'trams');
                const listeLignes = data[key] || [];
                const laLigne = listeLignes.find(item => item.line.toString().toLowerCase() === ligne.toLowerCase());
                
                if (laLigne && laLigne.slug !== "normal") {
                    text.innerHTML = `<div class="warning"><strong>⚠️ ${laLigne.title || 'Perturbation'}</strong><br>${laLigne.message}</div>`;
                } else {
                    text.innerHTML = `<div class="success">✅ <strong>Trafic régulier</strong><br>Trafic régulier sur l'ensemble de la ligne.</div>`;
                }
            })
            .catch(() => { 
                text.innerHTML = "<span style='color:red;'>Erreur de lecture du fichier trafic.json.</span>"; 
            });
    }
</script>
</body>
</html>
