<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Trafic Île-de-France Officiel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 24px; color: #111; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .section-transport {
            display: flex;
            align-items: center;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .type-label {
            width: 90px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        .type-icon {
            height: 30px;
            margin-right: 5px;
        }
        .lines-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        
        /* Style des boutons images */
        .line-btn {
            height: 32px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .line-btn:hover { transform: scale(1.15); }
        
        /* Fenêtre d'incidents */
        .incident-report {
            margin-top: 40px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: none;
        }
        .incident-report.active { display: block; }
        .report-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #0066cc; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔄 Information trafic en Temps Réel</h1>

    <div class="section-transport">
        <div class="type-label" id="rer-logo-container"></div>
        <div class="lines-grid" id="rer-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label" id="metro-logo-container"></div>
        <div class="lines-grid" id="metro-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label" id="tram-logo-container"></div>
        <div class="lines-grid" id="tram-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label" id="train-logo-container"></div>
        <div class="lines-grid" id="train-container"></div>
    </div>

    <div id="incident-box" class="incident-report">
        <div id="incident-title" class="report-title">Ligne</div>
        <div id="incident-text">Sélectionne une ligne pour voir l'état du trafic du tiécar.</div>
    </div>
</div>

<script>
    // Nouvelle source d'images Open Source ultra stable (merci la communauté !)
    const baseUrl = "https://raw.githubusercontent.com/pfeofficial/baryon-assets/main/stif";

    // Affichage des logos généraux des modes de transport à gauche
    document.getElementById('rer-logo-container').innerHTML = `<img class="type-icon" src="${baseUrl}/modes/rer.png" alt="RER">`;
    document.getElementById('metro-logo-container').innerHTML = `<img class="type-icon" src="${baseUrl}/modes/metro.png" alt="M">`;
    document.getElementById('tram-logo-container').innerHTML = `<img class="type-icon" src="${baseUrl}/modes/tram.png" alt="T">`;
    document.getElementById('train-logo-container').innerHTML = `<img class="type-icon" src="${baseUrl}/modes/train.png" alt="Train">`;

    // Listes exactes correspondant aux noms des fichiers images disponibles
    const rers = ['a', 'b', 'c', 'd', 'e'];
    const metros = ['1', '2', '3', '3bis', '4', '5', '6', '7', '7bis', '8', '9', '10', '11', '12', '13', '14'];
    const trams = ['1', '2', '3a', '3b', '4', '5', '6', '7', '8', '9']; // Trams principaux
    const trains = ['h', 'j', 'k', 'l', 'n', 'p', 'r', 'u'];

    // Génération automatique des boutons avec les vrais logos PNG bien nets
    function genererBoutons(liste, type, containerId) {
        const container = document.getElementById(containerId);
        liste.forEach(ligne => {
            const img = document.createElement('img');
            img.className = 'line-btn';
            
            // Format du lien : .../stif/lines/metro_1.png ou rer_a.png
            img.src = `${baseUrl}/lines/${type}_${ligne}.png`;
            img.alt = `${type} ${ligne}`;
            
            // On prépare le nom pour la recherche de texte (ex: "RER A" ou "Ligne 1")
            const nomRecherche = type === 'metro' ? `Ligne ${ligne}` : `${type.toUpperCase()} ${ligne.toUpperCase()}`;
            img.onclick = () => checkLigne(nomRecherche);
            
            container.appendChild(img);
        });
    }

    // Lancement de la génération
    genererBoutons(rers, 'rer', 'rer-container');
    genererBoutons(metros, 'metro', 'metro-container');
    genererBoutons(trams, 'tram', 'tram-container');
    genererBoutons(trains, 'train', 'train-container');

    // Recherche des incidents
    function checkLigne(nomLigne) {
        const box = document.getElementById('incident-box');
        const title = document.getElementById('incident-title');
        const text = document.getElementById('incident-text');
        
        title.innerText = `État du trafic - ${nomLigne}`;
        box.classList.add('active');
        
        fetch('trafic.json')
            .then(res => res.json())
            .then(data => {
                let incidentTrouve = "";
                
                if (data.resultats) {
                    data.resultats.forEach(item => {
                        if (item.texte && item.texte.toLowerCase().includes(nomLigne.toLowerCase())) {
                            incidentTrouve += `<p>⚠️ ${item.texte}</p>`;
                        }
                    });
                }
                
                if (incidentTrouve !== "") {
                    text.innerHTML = incidentTrouve;
                } else {
                    text.innerHTML = "✅ **Trafic régulier.** Aucune perturbation majeure signalée sur cette ligne.";
                }
            })
            .catch(() => {
                text.innerText = "Erreur de chargement. Attends que le robot ait fini d'écrire les données.";
            });
    }
</script>

</body>
</html>
