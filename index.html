<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Trafic IDF Pro</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 25px; border-bottom: 2px solid #002f6c; padding-bottom: 10px; }
        .section-transport { display: flex; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .type-label { width: 70px; font-weight: bold; color: #002f6c; font-size: 16px; }
        .lines-grid { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }
        .line-btn { height: 32px; width: 32px; cursor: pointer; transition: transform 0.1s; }
        .line-btn:hover { transform: scale(1.2); }
        .incident-report { margin-top: 30px; padding: 20px; background-color: #fff; border-radius: 8px; border: 2px solid #ddd; display: none; }
        .incident-report.active { display: block; }
        .report-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #002f6c; }
        .warning { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 4px; border-left: 4px solid #d32f2f; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 10px; border-radius: 4px; border-left: 4px solid #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔄 Information trafic en Temps Réel</h1>

    <div class="section-transport"><div class="type-label">Métro</div><div class="lines-grid" id="m-grid"></div></div>
    <div class="section-transport"><div class="type-label">RER</div><div class="lines-grid" id="r-grid"></div></div>
    <div class="section-transport"><div class="type-label">Tram</div><div class="lines-grid" id="t-grid"></div></div>

    <div id="incident-box" class="incident-report">
        <div id="incident-title" class="report-title">Ligne</div>
        <div id="incident-text">Sélectionne une ligne.</div>
    </div>
</div>

<script>
    // Banque d'images de l'API ChloroFil (Vrais logos officiels)
    const imgBase = "https://raw.githubusercontent.com/ChloroFil/api-ratp/master/assets";
    
    const metros = ['1','2','3','3bis','4','5','6','7','7bis','8','9','10','11','12','13','14'];
    const rers = ['A','B','C','D','E'];
    const trams = ['1','2','3a','3b','4','5','6','7','8'];

    function creerBoutons(liste, type, containerId) {
        const grid = document.getElementById(containerId);
        liste.forEach(l => {
            const img = document.createElement('img');
            img.className = 'line-btn';
            img.src = `${imgBase}/${type}s/${l}.svg`; // Charge le vrai SVG officiel !
            img.alt = `${type} ${l}`;
            img.onclick = () => verifTrafic(type, l);
            grid.appendChild(img);
        });
    }

    creerBoutons(metros, 'metro', 'm-grid');
    creerBoutons(rers, 'rer', 'r-grid');
    creerBoutons(trams, 'tram', 't-grid');

    function verifTrafic(type, ligne) {
        const box = document.getElementById('incident-box');
        const title = document.getElementById('incident-title');
        const text = document.getElementById('incident-text');
        
        title.innerText = `État du trafic - ${type.toUpperCase()} ${ligne}`;
        box.classList.add('active');
        text.innerHTML = "Chargement...";

        fetch('trafic.json')
            .then(res => res.json())
            .then(data => {
                const key = `${type}s`;
                const listeLignes = data.resultats && data.resultats[key];
                
                // On cherche la ligne cliquée dans le JSON
                const laLigne = listeLignes ? listeLignes.find(item => item.line.toLowerCase() === ligne.toLowerCase()) : null;
                
                if (laLigne && laLigne.slug !== "normal") {
                    text.innerHTML = `<div class="warning"><strong>⚠️ ${laLigne.title}</strong><br>${laLigne.message}</div>`;
                } else if (laLigne) {
                    text.innerHTML = `<div class="success">✅ <strong>Trafic régulier</strong><br>${laLigne.message}</div>`;
                } else {
                    text.innerHTML = `<div class="success">✅ <strong>Trafic régulier</strong><br>Aucun incident signalé sur le réseau.</div>`;
                }
            })
            .catch(() => { text.innerHTML = "<span style='color:red;'>Erreur : relance le robot dans l'onglet Actions.</span>"; });
    }
</script>
</body>
</html>
