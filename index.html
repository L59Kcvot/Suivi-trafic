<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Trafic Île-de-France Officiel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 24px; color: #111; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .section-transport {
            display: flex;
            align-items: center;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .type-label {
            width: 90px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        .type-icon {
            height: 24px;
            margin-right: 5px;
        }
        .lines-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        
        /* Style des boutons images */
        .line-btn {
            height: 30px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .line-btn:hover { transform: scale(1.15); }
        
        /* Fenêtre d'incidents */
        .incident-report {
            margin-top: 40px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: none;
        }
        .incident-report.active { display: block; }
        .report-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #0066cc; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔄 Information trafic en Temps Réel</h1>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="https://vianavigo.github.io/idfm-design-token/img/modes/rer.svg" alt="RER">
        </div>
        <div class="lines-grid" id="rer-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="https://vianavigo.github.io/idfm-design-token/img/modes/metro.svg" alt="Métro">
        </div>
        <div class="lines-grid" id="metro-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="https://vianavigo.github.io/idfm-design-token/img/modes/tram.svg" alt="Tram">
        </div>
        <div class="lines-grid" id="tram-container"></div>
    </div>

    <div class="section-transport">
        <div class="type-label">
            <img class="type-icon" src="https://vianavigo.github.io/idfm-design-token/img/modes/train.svg" alt="Train">
        </div>
        <div class="lines-grid" id="train-container"></div>
    </div>

    <div id="incident-box" class="incident-report">
        <div id="incident-title" class="report-title">Ligne</div>
        <div id="incident-text">Sélectionne une ligne pour voir l'état du trafic du tiécar.</div>
    </div>
</div>

<script>
    // Base des URLs pour récupérer les écussons officiels d'IDFM
    const baseUrl = "https://vianavigo.github.io/idfm-design-token/img/lines";

    // Listes de toutes les lignes d'Île-de-France
    const metros = ['1', '2', '3', '3bis', '4', '5', '6', '7', '7bis', '8', '9', '10', '11', '12', '13', '14'];
    const rers = ['A', 'B', 'C', 'D', 'E'];
    const trams = ['1', '2', '3a', '3b', '4', '5', '6', '7', '8', '9', '11', '12', '13'];
    const trains = ['H', 'J', 'K', 'L', 'N', 'P', 'R', 'U'];

    // Génération automatique des boutons avec les vrais logos
    function générerBoutons(liste, type, containerId) {
        const container = document.getElementById(containerId);
        liste.forEach(ligne => {
            const img = document.createElement('img');
            img.className = 'line-btn';
            // Exemple de lien généré : https://vianavigo.github.io/idfm-design-token/img/lines/METRO/1.svg
            img.src = `${baseUrl}/${type.toUpperCase()}/${ligne}.svg`;
            img.alt = `${type} ${ligne}`;
            img.onclick = () => checkLigne(`${type} ${ligne}`);
            container.appendChild(img);
        });
    }

    // On lance la création des boutons sur la page
    générerBoutons(rers, 'RER', 'rer-container');
    générerBoutons(metros, 'Métro', 'metro-container');
    générerBoutons(trams, 'Tram', 'tram-container');
    générerBoutons(trains, 'Train', 'train-container');

    // Fonction de recherche des incidents dans le fichier JSON du robot
    function checkLigne(nomLigne) {
        const box = document.getElementById('incident-box');
        const title = document.getElementById('incident-title');
        const text = document.getElementById('incident-text');
        
        title.innerText = `État du trafic - ${nomLigne}`;
        box.classList.add('active');
        
        fetch('trafic.json')
            .then(res => res.json())
            .then(data => {
                let incidentTrouve = "";
                
                if (data.resultats) {
                    data.resultats.forEach(item => {
                        if (item.texte && item.texte.toLowerCase().includes(nomLigne.toLowerCase())) {
                            incidentTrouve += `<p>⚠️ ${item.texte}</p>`;
                        }
                    });
                }
                
                if (incidentTrouve !== "") {
                    text.innerHTML = incidentTrouve;
                } else {
                    text.innerHTML = "✅ **Trafic régulier.** Aucune perturbation majeure signalée sur cette ligne.";
                }
            })
            .catch(() => {
                text.innerText = "Erreur de chargement. Attends que le robot ait fini d'écrire les données.";
            });
    }
</script>

</body>
</html>
