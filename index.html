<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Trafic Île-de-France Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 25px; border-bottom: 2px solid #002f6c; padding-bottom: 10px; color: #002f6c; }
        .section-transport { display: flex; align-items: center; margin-bottom: 20px; background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .type-label { width: 90px; font-weight: bold; color: #002f6c; font-size: 16px; text-transform: uppercase; }
        .lines-grid { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }
        .line-btn { height: 34px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        .line-btn:hover { transform: scale(1.2); }
        .incident-report { margin-top: 30px; padding: 20px; background-color: #fff; border-radius: 8px; border: 2px solid #ddd; display: none; }
        .incident-report.active { display: block; }
        .report-title { font-weight: bold; font-size: 18px; margin-bottom: 12px; color: #002f6c; display: flex; align-items: center; gap: 8px; }
        .warning { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; border-left: 5px solid #d32f2f; margin-bottom: 10px; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 12px; border-radius: 6px; border-left: 5px solid #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-train-subway"></i> Information trafic en Temps Réel</h1>

    <div class="section-transport"><div class="type-label">Métro</div><div class="lines-grid" id="m-grid"></div></div>
    <div class="section-transport"><div class="type-label">RER</div><div class="lines-grid" id="r-grid"></div></div>
    <div class="section-transport"><div class="type-label">Tram</div><div class="lines-grid" id="t-grid"></div></div>

    <div id="incident-box" class="incident-report">
        <div id="incident-title" class="report-title">Ligne</div>
        <div id="incident-text">Sélectionne une ligne.</div>
    </div>
</div>

<script>
    const idfmCodes = {
        '1': 'C01371', '2': 'C01372', '3': 'C01373', '3bis': 'C01386', '4': 'C01374',
        '5': 'C01375', '6': 'C01376', '7': 'C01377', '7bis': 'C01387', '8': 'C01378',
        '9': 'C01379', '10': 'C01380', '11': 'C01381', '12': 'C01382', '13': 'C01383', '14': 'C01384',
        'A': 'C01742', 'B': 'C01743', 'C': 'C01744', 'D': 'C01745', 'E': 'C01746',
        '1': 'C01389', '2': 'C01390', '3a': 'C01391', '3b': 'C01392', '4': 'C01819',
        '5': 'C01684', '6': 'C01794', '7': 'C01795', '8': 'C01796', '9': 'C02317'
    };

    const codesImages = {
        // Ajout du préfixe logos/ pour pointer vers le nouveau dossier bien rangé !
        'm-1': 'logos/LIG_IDFM_C01371.svg', 'm-2': 'logos/LIG_IDFM_C01372.svg', 'm-3': 'logos/LIG_IDFM_C01373.svg', 
        'm-4': 'logos/LIG_IDFM_C01374.svg', 'm-5': 'logos/LIG_IDFM_C01375.svg', 'm-6': 'logos/LIG_IDFM_C01376.svg', 
        'm-7': 'logos/LIG_IDFM_C01377.svg', 'm-8': 'logos/LIG_IDFM_C01378.svg', 'm-9': 'logos/LIG_IDFM_C01379.svg', 
        'm-10': 'logos/LIG_IDFM_C01380.svg', 'm-11': 'logos/LIG_IDFM_C01381.svg', 'm-12': 'logos/LIG_IDFM_C01382.svg', 
        'm-13': 'logos/LIG_IDFM_C01383.svg', 'm-14': 'logos/LIG_IDFM_C01384.svg', 
        'm-3bis': 'logos/picto-ligne-LIGIDFMC01386.1781406331.svg', 'm-7bis': 'logos/picto-ligne-LIGIDFMC01387.1781406331.svg',
        'rer-A': 'logos/LIG_IDFM_C01742.svg', 'rer-B': 'logos/LIG_IDFM_C01743.svg', 'rer-C': 'logos/LIG_IDFM_C01744.svg', 'rer-D': 'logos/LIG_IDFM_C01745.svg', 'rer-E': 'logos/LIG_IDFM_C01746.svg',
        'tram-1': 'logos/LIG_IDFM_C01389.svg', 'tram-2': 'logos/LIG_IDFM_C01390.svg', 'tram-3a': 'logos/LIG_IDFM_C01391.svg', 'tram-3b': 'logos/LIG_IDFM_C01392.svg', 
        'tram-4': 'logos/LIG_IDFM_C01819.svg', 'tram-5': 'logos/LIG_IDFM_C01684.svg', 'tram-6': 'logos/LIG_IDFM_C01794.svg', 'tram-7': 'logos/LIG_IDFM_C01795.svg', 
        'tram-8': 'logos/LIG_IDFM_C01796.svg', 'tram-9': 'logos/LIG_IDFM_C02317.svg'
    };

    const metros = ['1','2','3','3bis','4','5','6','7','7bis','8','9','10','11','12','13','14'];
    const rers = ['A','B','C','D','E'];
    const trams = ['1','2','3a','3b','4','5','6','7','8','9'];

    const mGrid = document.getElementById('m-grid');
    metros.forEach(l => {
        const img = document.createElement('img');
        img.className = 'line-btn';
        img.src = codesImages[`m-${l}`]; 
        img.alt = `Métro ${l}`;
        img.onclick = () => verifTrafic('metro', l);
        mGrid.appendChild(img);
    });

    const rGrid = document.getElementById('r-grid');
    rers.forEach(l => {
        const img = document.createElement('img');
        img.className = 'line-btn';
        img.src = codesImages[`rer-${l}`];
        img.alt = `RER ${l}`;
        img.onclick = () => verifTrafic('rer', l);
        rGrid.appendChild(img);
    });

    const tGrid = document.getElementById('t-grid');
    trams.forEach(l => {
        const img = document.createElement('img');
        img.className = 'line-btn';
        img.src = codesImages[`tram-${l}`];
        img.alt = `Tram ${l}`;
        img.onclick = () => verifTrafic('tram', l);
        tGrid.appendChild(img);
    });

    function verifTrafic(type, ligne) {
        const box = document.getElementById('incident-box');
        const title = document.getElementById('incident-title');
        const text = document.getElementById('incident-text');
        
        title.innerHTML = `<i class="fa-solid fa-circle-info"></i> État du trafic - ${type.toUpperCase()} ${ligne}`;
        box.classList.add('active');
        text.innerHTML = "Connexion directe aux serveurs de la région...";

        const proxy = "https://corsproxy.io/?";
        const targetApi = "https://prim.iledefrance-mobilites.fr/api/v2/gbfs/lines/line_reports.json";
        
        fetch(proxy + encodeURIComponent(targetApi), {
            headers: { 'apiKey': 'WEtotfEFSLYs1wE9QMSK6nC46rvqnf4f' }
        })
        .then(res => res.json())
        .then(data => {
            const reports = data.line_reports || [];
            const idTarget = idfmCodes[ligne];

            const alerte = reports.find(r => r.line && r.line.id && r.line.id.includes(idTarget));

            if (alerte) {
                const cause = alerte.cause || "Perturbation";
                const desc = alerte.description || "Trafic raleni ou interrompu.";
                text.innerHTML = `<div class="warning"><strong>⚠️ ${cause}</strong><br>${desc}</div>`;
            } else {
                text.innerHTML = `<div class="success">✅ <strong>Trafic régulier</strong><br>Le trafic est fluide sur l'ensemble de la ligne, aucun incident majeur signalé.</div>`;
            }
        })
        .catch(() => {
            text.innerHTML = "<span style='color:red;'>Erreur de flux direct. Réessaye dans 2 secondes.</span>";
        });
    }
</script>
</body>
</html>
